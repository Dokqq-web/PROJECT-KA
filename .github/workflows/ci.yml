name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check
      - run: pnpm run build
      - run: pnpm test
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:browser
      - run: node --check dashboard/app.js
      - run: node --check demo/server.mjs
      - run: node --check demo/appium-mock.mjs
      - run: node --check demo/integration-mock.mjs
