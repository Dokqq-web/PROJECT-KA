services:
  qa-bot:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      API_PORT: "8080"
      DATABASE_PATH: "/app/data/qa-bot.db"
      RUN_CONCURRENCY: "${RUN_CONCURRENCY:-2}"
      HTTP_TIMEOUT_MS: "${HTTP_TIMEOUT_MS:-15000}"
      HTTP_RETRY_COUNT: "${HTTP_RETRY_COUNT:-2}"
      HTTP_RETRY_BASE_MS: "${HTTP_RETRY_BASE_MS:-250}"
      MAX_CONNECTOR_ITEMS: "${MAX_CONNECTOR_ITEMS:-500}"
      OUTBOUND_HOST_ALLOWLIST: "${OUTBOUND_HOST_ALLOWLIST:-}"
      ALLOW_PRIVATE_NETWORKS: "${ALLOW_PRIVATE_NETWORKS:-false}"
      RETENTION_DAYS: "${RETENTION_DAYS:-30}"
      ARTIFACTS_DIRECTORY: "/app/artifacts"
      UPLOADS_DIRECTORY: "/app/data/uploads"
      MAX_UPLOAD_BYTES: "${MAX_UPLOAD_BYTES:-5000000}"
      MAX_REQUEST_BODY_BYTES: "${MAX_REQUEST_BODY_BYTES:-8000000}"
      BASELINE_DIRECTORY: "/app/data/baselines"
      UPDATE_SNAPSHOTS: "${UPDATE_SNAPSHOTS:-false}"
      BOOTSTRAP_API_KEY: "${BOOTSTRAP_API_KEY:?Set BOOTSTRAP_API_KEY}"
      BOOTSTRAP_NAME: "${BOOTSTRAP_NAME:-Administrator}"
      BOOTSTRAP_ROLE: "admin"
      SECRET_MASTER_KEY: "${SECRET_MASTER_KEY:?Set SECRET_MASTER_KEY}"
      NOTIFICATION_WEBHOOK_URL: "${NOTIFICATION_WEBHOOK_URL:-}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
      NOTIFICATION_NOTIFY_ON: "${NOTIFICATION_NOTIFY_ON:-always}"
    volumes:
      - qa-bot-data:/app/data
      - qa-bot-artifacts:/app/artifacts
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/ready').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  qa-bot-data:
  qa-bot-artifacts:
